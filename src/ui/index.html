<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Onboarding Agent</title>
  <style>
    :root {
      --brand-color: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 640px;
      height: 100vh;
      max-height: 780px;
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .chat-header {
      background: #000;
      padding: 20px 24px;
      border-bottom: 1px solid #222;
    }

    .chat-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header p { font-size: 12px; color: #666; margin-top: 4px; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.4);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      overflow-wrap: break-word;
      animation: fadeIn 0.3s ease;
      white-space: pre-line;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      background: #1a1a1a;
      color: #e5e5e5;
      align-self: flex-start;
      border: 1px solid #252525;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: var(--brand-color);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.system {
      background: transparent;
      color: #555;
      font-size: 12px;
      align-self: center;
      border: 1px solid #1f1f1f;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .typing {
      display: none;
      gap: 5px;
      padding: 14px 18px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      align-self: flex-start;
    }

    .typing.show { display: flex; align-items: center; }

    .typing span {
      width: 6px; height: 6px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 10px;
      background: #0d0d0d;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #252525;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .2s;
    }

    textarea:focus { border-color: var(--brand-color); }
    textarea::placeholder { color: #444; }

    button#send {
      background: var(--brand-color);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity .15s, transform .1s;
      min-width: 70px;
    }

    button#send:hover    { opacity: .9; }
    button#send:active   { transform: scale(0.97); }
    button#send:disabled { opacity: .3; cursor: default; transform: none; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #2a2a2a;
      padding: 10px;
      background: #0a0a0a;
    }

    .footer a { color: #3a3a3a; text-decoration: none; }
    .footer a:hover { color: #555; }

    @media (max-width: 680px) {
      .chat-container {
        max-height: 100vh;
        border-radius: 0;
        border: none;
      }
      body { background: #111; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1 id="brand-name">Loading...</h1>
      <p><span class="status-dot"></span><span id="agent-role">Online</span></p>
    </div>

    <div class="messages" id="messages">
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1" maxlength="2000"></textarea>
      <button id="send">Send</button>
    </div>

    <div class="footer">
      Powered by <a href="https://blokblokstudio.com" target="_blank" rel="noopener noreferrer">Blok Blok Studio</a>
    </div>
  </div>

  <script>
    "use strict";

    var API = window.location.origin;
    var MAX_MSG_LENGTH = 2000;
    var sessionId = null;
    var busy = false;
    var done = false;

    var messagesEl = document.getElementById("messages");
    var inputEl    = document.getElementById("input");
    var sendBtn    = document.getElementById("send");
    var typingEl   = document.getElementById("typing");

    // XSS-safe message rendering — always uses textContent, never innerHTML
    function addMessage(role, text) {
      var safeRole = ["assistant", "user", "system"].indexOf(role) !== -1 ? role : "system";
      var div = document.createElement("div");
      div.className = "message " + safeRole;
      div.textContent = text;
      messagesEl.insertBefore(div, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(val) {
      busy = val;
      typingEl.classList.toggle("show", val);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      sendBtn.disabled = val || done;
      inputEl.disabled = val || done;
      if (!val && !done) inputEl.focus();
    }

    function handleDone() {
      done = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;
      inputEl.placeholder = "Conversation complete. Refresh to start a new one.";
    }

    async function send() {
      var msg = inputEl.value.trim();
      if (!msg || busy || done) return;

      if (msg.length > MAX_MSG_LENGTH) {
        addMessage("system", "Message too long. Please keep it under " + MAX_MSG_LENGTH + " characters.");
        return;
      }

      inputEl.value = "";
      inputEl.style.height = "auto";
      addMessage("user", msg);
      setBusy(true);

      try {
        var r = await fetch(API + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sessionId, message: msg })
        });

        if (!r.ok) {
          var errData = await r.json().catch(function() { return {}; });
          setBusy(false);
          addMessage("system", errData.error || "Something went wrong. Please try again.");
          return;
        }

        var data = await r.json();
        sessionId = data.sessionId;
        setBusy(false);
        addMessage("assistant", data.reply);

        if (data.done) {
          handleDone();
        }
      } catch (e) {
        setBusy(false);
        addMessage("system", "Connection error \u2014 please refresh.");
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener("input", function() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Load branding + get instant greeting
    async function init() {
      // Load config for branding
      try {
        var r = await fetch(API + "/api/config");
        var cfg = await r.json();
        document.title = cfg.brandName;
        document.getElementById("brand-name").textContent = cfg.brandName;
        document.getElementById("agent-role").textContent = cfg.agentName + " \u00B7 " + cfg.agentRole;

        // Apply brand color if configured
        if (cfg.primaryColor) {
          document.documentElement.style.setProperty("--brand-color", cfg.primaryColor);
        }
      } catch (e) { /* use defaults */ }

      // Get instant greeting from /api/start (no Claude API call needed)
      try {
        var r2 = await fetch(API + "/api/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });
        var data = await r2.json();
        sessionId = data.sessionId;
        addMessage("assistant", data.reply);
      } catch (e) {
        addMessage("system", "Unable to connect. Please refresh.");
      }

      inputEl.focus();
    }

    init();
  </script>
</body>
</html>
