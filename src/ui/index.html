<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Onboarding Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 640px;
      height: 100vh;
      max-height: 780px;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #000;
      padding: 20px 24px;
      border-bottom: 1px solid #222;
    }

    .chat-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .chat-header p  { font-size: 12px; color: #555; margin-top: 3px; }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .message.assistant {
      background: #1a1a1a;
      color: #e5e5e5;
      align-self: flex-start;
      border: 1px solid #252525;
    }

    .message.user {
      background: #fff;
      color: #000;
      align-self: flex-end;
    }

    .message.system {
      background: transparent;
      color: #444;
      font-size: 11px;
      align-self: center;
      border: 1px solid #222;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .typing {
      display: none;
      gap: 5px;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 12px;
      width: fit-content;
      align-self: flex-start;
    }

    .typing.show { display: flex; align-items: center; }

    .typing span {
      width: 6px; height: 6px;
      background: #444;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 10px;
      background: #0d0d0d;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #252525;
      color: #fff;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .15s;
    }

    textarea:focus   { border-color: #3a3a3a; }
    textarea::placeholder { color: #3a3a3a; }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity .15s;
    }

    button:hover    { opacity: .85; }
    button:disabled { opacity: .25; cursor: default; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #2a2a2a;
      padding: 8px;
      background: #0d0d0d;
    }

    .footer a { color: #333; text-decoration: none; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1 id="brand-name">Loading...</h1>
      <p><span class="status-dot"></span><span id="agent-role">Online</span></p>
    </div>

    <div class="messages" id="messages">
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1" maxlength="2000"></textarea>
      <button id="send">Send</button>
    </div>

    <div class="footer">
      Powered by <a href="https://blokblokstudio.com" target="_blank" rel="noopener noreferrer">Blok Blok Studio</a>
    </div>
  </div>

  <script>
    "use strict";

    const API = window.location.origin;
    const MAX_MSG_LENGTH = 2000;
    let sessionId = null;
    let busy = false;
    let done = false;

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send");
    const typingEl   = document.getElementById("typing");

    // XSS-safe message rendering — always uses textContent, never innerHTML
    function addMessage(role, text) {
      // Validate role to prevent class injection
      const safeRole = ["assistant", "user", "system"].includes(role) ? role : "system";
      const div = document.createElement("div");
      div.className = "message " + safeRole;
      div.textContent = text; // textContent is XSS-safe
      messagesEl.insertBefore(div, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(val) {
      busy = val;
      typingEl.classList.toggle("show", val);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      sendBtn.disabled   = val || done;
      inputEl.disabled   = val || done;
    }

    async function send() {
      const msg = inputEl.value.trim();
      if (!msg || busy || done) return;

      // Client-side length check
      if (msg.length > MAX_MSG_LENGTH) {
        addMessage("system", "Message too long. Please keep it under " + MAX_MSG_LENGTH + " characters.");
        return;
      }

      inputEl.value = "";
      inputEl.style.height = "auto";
      addMessage("user", msg);
      setBusy(true);

      try {
        const r = await fetch(API + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sessionId, message: msg })
        });

        if (!r.ok) {
          const err = await r.json().catch(function() { return {}; });
          setBusy(false);
          addMessage("system", err.error || "Something went wrong. Please try again.");
          return;
        }

        const data = await r.json();
        sessionId  = data.sessionId;
        setBusy(false);
        addMessage("assistant", data.reply);

        if (data.done) {
          done = true;
          setBusy(false);
          inputEl.placeholder = "Conversation complete.";
        }
      } catch (e) {
        setBusy(false);
        addMessage("system", "Connection error — please refresh.");
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener("input", function() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Load branding + kick off greeting
    async function init() {
      try {
        const r   = await fetch(API + "/api/config");
        const cfg = await r.json();
        document.title = cfg.brandName;
        document.getElementById("brand-name").textContent = cfg.brandName;
        document.getElementById("agent-role").textContent = cfg.agentName + " \u00B7 " + cfg.agentRole;
      } catch (e) { /* use defaults */ }

      setBusy(true);
      try {
        const r    = await fetch(API + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: "start" })
        });
        const data = await r.json();
        sessionId  = data.sessionId;
        setBusy(false);
        addMessage("assistant", data.reply);
      } catch (e) {
        setBusy(false);
        addMessage("system", "Unable to connect. Please refresh.");
      }
    }

    init();
  </script>
</body>
</html>
